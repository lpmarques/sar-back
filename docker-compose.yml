services:
  django:
    build: .
    container_name: sar-back-django
    network_mode: host
    env_file:
      - .env.staging
      # - .env.development
  nginx:
    image: nginx:1.21.6-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-variables.conf.template:/etc/nginx/templates/variables.conf.template:ro
    depends_on:
      - django
    environment:
      DJANGO_URL: http://127.0.0.1
      DJANGO_PORT: 8000
    network_mode: "host"
